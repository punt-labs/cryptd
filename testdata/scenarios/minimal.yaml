title: "Minimal Dungeon"
starting_room: entrance
death: respawn

rooms:
  entrance:
    name: "Entrance Hall"
    description_seed: "A cold stone hall with torches flickering on the walls."
    connections:
      south:
        room: goblin_lair
        type: open
      west:
        room: vault
        type: locked
  goblin_lair:
    name: "Goblin Lair"
    description_seed: "Damp and foul-smelling. Bones crunch underfoot."
    connections:
      north:
        room: entrance
        type: open
    enemies: [goblin]
    items: [rusty_key]

  vault:
    name: "Vault"
    description_seed: "A heavy iron door seals whatever lies within."
    connections:
      east:
        room: entrance
        type: locked
    items: [gold_coin]

enemies:
  goblin:
    name: Goblin
    hp: 8
    attack: "1d4"
    ai: aggressive

items:
  rusty_key:
    name: "Rusty Key"
    description: "An old iron key, pitted with rust."
    type: key
    weight: 0.1
    value: 0

  gold_coin:
    name: "Gold Coin"
    description: "A single gold coin, worn smooth."
    type: misc
    weight: 0.01
    value: 1
