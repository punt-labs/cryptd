title: "Minimal Dungeon"
starting_room: entrance
death: respawn

rooms:
  entrance:
    name: "Entrance Hall"
    description_seed: "A cold stone hall with torches flickering on the walls."
    connections:
      south:
        room: goblin_lair
        type: open
      west:
        room: vault
        type: locked
      north:
        room: secret_room
        type: hidden
    items: [short_sword]
  goblin_lair:
    name: "Goblin Lair"
    description_seed: "Damp and foul-smelling. Bones crunch underfoot."
    connections:
      north:
        room: entrance
        type: open
    enemies: [goblin]
    items: [rusty_key]

  secret_room:
    name: "Secret Room"
    description_seed: "A hidden chamber behind the entrance."
    connections:
      south:
        room: entrance
        type: open

  vault:
    name: "Vault"
    description_seed: "A heavy iron door seals whatever lies within."
    connections:
      east:
        room: entrance
        type: locked
    items: [gold_coin]

enemies:
  goblin:
    name: Goblin
    hp: 8
    attack: "1d4"
    ai: aggressive

spells:
  fireball:
    name: Fireball
    mp: 3
    effect: damage
    power: "2d6"
    classes: [mage, priest]
  heal:
    name: Heal
    mp: 2
    effect: heal
    power: "1d6+2"
    classes: [priest, mage]

items:
  short_sword:
    name: "Short Sword"
    description: "A simple but serviceable blade."
    type: weapon
    damage: "1d6"
    weight: 3.0
    value: 10

  rusty_key:
    name: "Rusty Key"
    description: "An old iron key, pitted with rust."
    type: key
    weight: 0.1
    value: 0

  gold_coin:
    name: "Gold Coin"
    description: "A single gold coin, worn smooth."
    type: misc
    weight: 0.01
    value: 1
