# minimal-run.yaml — M2 E2E acceptance script
# Run with: crypt headless --script testdata/scripts/minimal-run.yaml
#
# Steps are sent as stdin lines; assertions check stdout contains expected text.

scenario: minimal

steps:
  - input: "go south"
    expect_output: "goblin_lair"

  - input: "look"
    expect_output: "goblin_lair"

  - input: "go north"
    expect_output: "entrance"

  - input: "quit"
