# =============================================================================
# ITEMS
# =============================================================================

items:
  # Weapons
  kill_nine:
    name: "Kill Nine"
    description: "The ultimate signal — kill -9. SIGKILL. No process can catch it, no process can ignore it. Unceremonious but effective."
    type: weapon
    damage: "1d8+1"
    weight: 1.0
    value: 25

  strace_blade:
    name: "Strace Blade"
    description: "A system call tracer forged into a blade. Each strike exposes the target's internal state — file descriptors, memory maps, signal handlers."
    type: weapon
    damage: "1d6+2"
    weight: 1.5
    value: 30

  gdb_debugger:
    name: "GDB Debugger"
    description: "The GNU Debugger. Heavy, slow, devastatingly powerful. Set breakpoints in your enemies. Examine their memory. Change their variables. Few can withstand a full debug session."
    type: weapon
    damage: "1d10"
    weight: 3.0
    value: 50

  chmod_hammer:
    name: "Chmod Hammer"
    description: "Root's weapon of choice. chmod 000 — remove all permissions. chmod 777 — grant everything. The hammer swings both ways."
    type: weapon
    damage: "1d8+3"
    weight: 2.0
    value: 60

  # Armor
  alias_shield:
    name: "Alias Shield"
    description: "Sourced from .bashrc. The alias 'shield=deflect -a' wraps around you like armor, deflecting the worst of incoming signals."
    type: armor
    weight: 2.0
    value: 15

  chroot_jail:
    name: "Chroot Jail"
    description: "Portable filesystem isolation. Locks you into a restricted root — attacks from outside the chroot can't reach you."
    type: armor
    weight: 3.0
    value: 35

  container_shell:
    name: "Container Shell"
    description: "A lightweight Docker container. Namespace isolation protects you from most system-level attacks. Not as strong as chroot, but more flexible."
    type: armor
    weight: 1.5
    value: 25

  iptables_shield:
    name: "Iptables Shield"
    description: "A restored firewall ruleset. INPUT: DROP all except established. FORWARD: DROP. OUTPUT: ACCEPT. Wearing this blocks incoming attacks."
    type: ring
    weight: 0.5
    value: 40

  # Amulets
  grep_tool:
    name: "Grep Tool"
    description: "A powerful pattern-matching tool. With this, you can search for weaknesses in any process — and reveal hidden enemies like rootkits."
    type: amulet
    weight: 0.3
    value: 20

  # Keys and quest items
  man_page:
    name: "Man Page"
    description: "man survival(7) — In the UNIX Catacombs, you are a process on a compromised system. Explore the filesystem, find the threat, clean the system, trace the attacker. Trust no binary. Read the logs. Find root."
    type: misc
    weight: 0.1
    value: 0

  pipe_connector:
    name: "Pipe Connector"
    description: "A UNIX pipe fragment from /tmp. Could connect processes or unlock sealed pipe gates."
    type: key
    weight: 0.5
    value: 5

  shadow_file:
    name: "Shadow File"
    description: "A copy of /etc/shadow. Password hashes for every user on the system. Can crack passwords and unlock areas that require authentication."
    type: key
    weight: 0.1
    value: 50

  sudo_token:
    name: "Sudo Token"
    description: "A temporary privilege escalation token obtained from the PAM configuration. Grants access to /root."
    type: key
    weight: 0.0
    value: 75

  admin_ssh_key:
    name: "Admin SSH Key"
    description: "The administrator's private SSH key. Grants access to the web server via SSH."
    type: key
    weight: 0.1
    value: 40

  root_ssh_key:
    name: "Root SSH Key"
    description: "Root's private SSH key. Grants access to the database server via SSH."
    type: key
    weight: 0.1
    value: 60

  dev_ssh_key:
    name: "Dev SSH Key"
    description: "The developer's private SSH key. Unencrypted. Grants access to the build server."
    type: key
    weight: 0.1
    value: 40

  root_shell:
    name: "Root Shell"
