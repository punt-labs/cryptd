# =============================================================================
# ITEMS
# =============================================================================

items:
  # Weapons
  kill_nine:
    name: "Kill Nine"
    description: "The ultimate signal — kill -9. SIGKILL. No process can catch it, no process can ignore it. Unceremonious but effective."
    type: weapon
    damage: "1d8+1"
    weight: 1.0
    value: 25

  strace_blade:
    name: "Strace Blade"
    description: "A system call tracer forged into a blade. Each strike exposes the target's internal state — file descriptors, memory maps, signal handlers."
    type: weapon
    damage: "1d6+2"
    weight: 1.5
    value: 30

  gdb_debugger:
    name: "GDB Debugger"
    description: "The GNU Debugger. Heavy, slow, devastatingly powerful. Set breakpoints in your enemies. Examine their memory. Change their variables. Few can withstand a full debug session."
    type: weapon
    damage: "1d10"
    weight: 3.0
    value: 50

  chmod_hammer:
    name: "Chmod Hammer"
    description: "Root's weapon of choice. chmod 000 — remove all permissions. chmod 777 — grant everything. The hammer swings both ways."
    type: weapon
    damage: "1d8+3"
    weight: 2.0
    value: 60

  # Armor
  alias_shield:
    name: "Alias Shield"
    description: "Sourced from .bashrc. The alias 'shield=deflect -a' wraps around you like armor, deflecting the worst of incoming signals."
    type: armor
    weight: 2.0
    value: 15

  chroot_jail:
    name: "Chroot Jail"
    description: "Portable filesystem isolation. Locks you into a restricted root — attacks from outside the chroot can't reach you."
    type: armor
    weight: 3.0
    value: 35

  container_shell:
    name: "Container Shell"
    description: "A lightweight Docker container. Namespace isolation protects you from most system-level attacks. Not as strong as chroot, but more flexible."
    type: armor
    weight: 1.5
    value: 25

  iptables_shield:
    name: "Iptables Shield"
    description: "A restored firewall ruleset. INPUT: DROP all except established. FORWARD: DROP. OUTPUT: ACCEPT. Wearing this blocks incoming attacks."
    type: ring
    weight: 0.5
    value: 40

  # Amulets
  grep_tool:
    name: "Grep Tool"
    description: "A powerful pattern-matching tool. With this, you can search for weaknesses in any process — and reveal hidden enemies like rootkits."
    type: amulet
    weight: 0.3
    value: 20

  # Keys and quest items
  man_page:
    name: "Man Page"
    description: "man survival(7) — In the UNIX Catacombs, you are a process on a compromised system. Explore the filesystem, find the threat, clean the system, trace the attacker. Trust no binary. Read the logs. Find root."
    type: misc
    weight: 0.1
    value: 0

  pipe_connector:
    name: "Pipe Connector"
    description: "A UNIX pipe fragment from /tmp. Could connect processes or unlock sealed pipe gates."
    type: key
    weight: 0.5
    value: 5

  shadow_file:
    name: "Shadow File"
    description: "A copy of /etc/shadow. Password hashes for every user on the system. Can crack passwords and unlock areas that require authentication."
    type: key
    weight: 0.1
    value: 50

  sudo_token:
    name: "Sudo Token"
    description: "A temporary privilege escalation token obtained from the PAM configuration. Grants access to /root."
    type: key
    weight: 0.0
    value: 75

  admin_ssh_key:
    name: "Admin SSH Key"
    description: "The administrator's private SSH key. Grants access to the web server via SSH."
    type: key
    weight: 0.1
    value: 40

  root_ssh_key:
    name: "Root SSH Key"
    description: "Root's private SSH key. Grants access to the database server via SSH."
    type: key
    weight: 0.1
    value: 60

  dev_ssh_key:
    name: "Dev SSH Key"
    description: "The developer's private SSH key. Unencrypted. Grants access to the build server."
    type: key
    weight: 0.1
    value: 40

  root_shell:
    name: "Root Shell"
    description: "root@catacombs:~# — You are root. The system is yours. With this, you can execute the hardening script and secure the system."
    type: amulet
    weight: 0.0
    value: 100

  security_notice:
    name: "Security Notice"
    description: "URGENT: Suspicious activity detected by monitoring. Outbound connections to known C2 IP. New user account 'backdoor' created. Investigate immediately. — Monitoring System, 72h ago"
    type: misc
    weight: 0.1
    value: 5

  attacker_notes:
    name: "Attacker Notes"
    description: "Handwritten notes from the attacker's staging directory. Timeline: Day 1 — exploit legacy app, create backdoor user. Day 2 — install rootkit, trojan binaries, set up persistence. Day 3 — exfiltrate data, pivot to other hosts."
    type: misc
    weight: 0.1
    value: 30

  rogue_ssh_key:
    name: "Rogue SSH Key"
    description: "The attacker's SSH public key, found in /etc/ssh/authorized_keys. Comment: 'persistence@c2.darknet.onion'. Removing this revokes the attacker's key-based access."
    type: misc
    weight: 0.0
    value: 15

  grub_config:
    name: "GRUB Config"
    description: "A modified grub.cfg with a boot entry that drops to a root shell without authentication. Another persistence mechanism."
    type: misc
    weight: 0.1
    value: 10

  ir_script:
    name: "Incident Response Script"
    description: "Admin's incident response script. Collects logs, checksums binaries, checks for IOCs. Running it would generate a comprehensive report of the compromise."
    type: misc
    weight: 0.2
    value: 20

  hardening_script:
    name: "Hardening Script"
    description: "Root's system hardening script. Removes backdoor accounts, restores firewall rules, disables unnecessary services, enables ASLR, blocks module loading. The cure for this system."
    type: misc
    weight: 0.2
    value: 80

  real_ls:
    name: "Real ls"
    description: "The original, untrojaned /usr/bin/ls. Backed up at .ls.bak before the attacker replaced it. Shows hidden attacker files that the trojaned version filters out."
    type: misc
    weight: 0.5
    value: 15

  exploit_payload:
    name: "Exploit Payload"
    description: "A compiled exploit from the attacker's staging area in /tmp/.hidden. Targets the legacy application's deserialization vulnerability. Could be useful... or dangerous."
    type: misc
    weight: 0.3
    value: 25

  web_shell_evidence:
    name: "Web Shell Evidence"
    description: "A copy of the upload.php web shell found in /var/www/html. Simple PHP backdoor that executes arbitrary commands. Evidence of the attacker's access method."
    type: misc
    weight: 0.1
    value: 10

  db_credentials:
    name: "Database Credentials"
    description: "Plaintext database credentials from the legacy app's configuration: root:P@ssw0rd123. The same password works for MySQL, the admin panel, and probably the database server."
    type: key
    weight: 0.0
    value: 35

  # Consumables
  core_dump:
    name: "Core Dump"
    description: "A fresh core dump from a crashed process. Still warm. Analyzing it reveals useful information about the system state. Restores vitality."
    type: consumable
    weight: 1.0
    value: 5

  core_dump_2:
    name: "Core Dump"
    description: "Another core dump. This system crashes a lot. At least they're nutritious."
    type: consumable
    weight: 1.0
    value: 5

  entropy_potion:
    name: "Entropy Potion"
    description: "Crystallized randomness from /dev/random. Restores magical energy. Tastes like static."
    type: consumable
    weight: 0.3
    value: 10

  entropy_potion_2:
    name: "Entropy Potion"
    description: "More crystallized entropy. The pool is generous today."
    type: consumable
    weight: 0.3
    value: 10

