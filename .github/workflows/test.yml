name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: go test -race -count=1 ./...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run integration tests
        run: go test -race -tags integration -count=1 ./...

  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run acceptance tests
        run: go test -race -tags acceptance ./e2e/...

  coverage:
    name: Engine Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check engine coverage ≥ 90%
        run: |
          if ! go list ./internal/engine/... > /dev/null 2>&1; then
            echo "No engine packages yet — coverage gate passes trivially"
            exit 0
          fi
          go test -cover -coverprofile=coverage.out ./internal/engine/...
          pct=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,"",$3); print $3}')
          echo "Engine coverage: ${pct}%"
          awk "BEGIN{if(${pct:-0}<90){print \"Coverage ${pct}% < 90% required\"; exit 1}}"

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [unit, integration, acceptance, coverage]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.unit.result }}" != "success" ]] ||
             [[ "${{ needs.integration.result }}" != "success" ]] ||
             [[ "${{ needs.acceptance.result }}" != "success" ]] ||
             [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
